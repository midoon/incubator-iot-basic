server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api ke backend Go — termasuk SSE streaming
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        # Header penting untuk SSE agar tidak di-buffer Nginx
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vue Router — semua route dikembalikan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
